# EVA Configuration
# Version: 0.1.0-dev
# Phase: P0

version: "0.1.0-dev"
environment: "development"

# Chemins de persistance (relatifs à la racine Eva/)
paths:
  data_root: "data"
  logs: "data/logs"
  memory: "data/memory"
  cache: "data/cache"
  prompts: "data/prompts"
  dumps: "data/dumps"

# Logging (détails en R-009)
logging:
  level: INFO
  format: detailed
  max_file_size_mb: 10
  max_backup_count: 5

# Engine (détails en R-006)
engine:
  pipeline_mode: "sequential"
  auto_start: false

# LLM (détails en R-012)
llm:
  default_provider: ollama  # ← NOUVEAU : ollama par défaut
  
  models:
    dev: "llama3.2:latest"
    default: "llama3:8b"
  
  ollama:
    endpoint: "http://localhost:11434"
  
  openai:
    # Config OpenAI (si utilisé)
    # Nécessite OPENAI_API_KEY dans .env
  
  timeout: 30
  max_retries: 3
  retry_delay: 1

# ... config existante

  # Paramètres génération
  max_tokens: 2000
  temperature: 0.7

  # Timeout et retries
  timeout: 30 # Secondes
  max_retries: 3 # Tentatives sur erreurs transient
  retry_delay: 1 # Secondes entre retries

# Memory (détails en R-011)
memory:
    context_window: 10

# Plugins (détails en R-015)
plugins:
  enabled: []
  auto_load: false

# Prompt management (R-013)
prompt:
  defaults:
    tone: "professionnel"
    expertise: "assistant général"
