# ─────────────────────────────────────────────────────────────────────────────
# CI — EVA Assistant
# ─────────────────────────────────────────────────────────────────────────────
#
# Déclenchement : push + PR sur master
# Jobs          : lint → core-smoke → test (matrice 3.9 + 3.11)
# Python        : >=3.9,<3.13  (voir pyproject.toml)
#                 CI : 3.9 (baseline) + 3.11 (LTS récent)
#
# Install CI : pip install -e ".[dev,api,tui,rag]"
#   → installe tous les extras pour tester l'intégralité de la suite
#   → install minimal `pip install -e .` validé par le job core-smoke
#
# Sécurité :
#   - Aucun service externe requis (Ollama, LLM) : tests marqués xfail
#   - TestClient Starlette : pas de bind réseau réel
#   - host=127.0.0.1 imposé dans le code (eva/api/app.py, eva/web/app.py)
#     → aucun endpoint exposé lors des tests CI
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install "flake8>=6.0"

      - name: Run flake8 — erreurs critiques
        # Phase 4 : uniquement les erreurs critiques
        #   E9  : erreurs de syntaxe Python
        #   F63 : assertions invalides
        #   F7  : erreurs de syntaxe dans les f-strings
        #   F82 : noms non définis (NameError potentiel)
        # Style (E501 longueur, W503, etc.) = Phase 5 après stabilisation black
        run: |
          flake8 eva/ \
            --select=E9,F63,F7,F82 \
            --statistics \
            --show-source

  # ── Core Smoke ──────────────────────────────────────────────────────────────
  core-smoke:
    name: Core smoke (install minimal)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core only (sans extras)
        # Valide que pip install -e . fonctionne sans dépendances lourdes
        run: pip install -e .

      - name: Smoke — import eva
        run: python -c "import eva; print('eva', eva.__version__)"

      - name: Smoke — eva --version
        run: eva --version

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, core-smoke]

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"   # baseline (développé sur cette version)
          - "3.11"  # LTS récent (compatibilité vérifiée)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + tous les extras
        # Installer tous les extras pour tester la suite complète
        # install minimal (pip install -e .) = core only (pas testé ici)
        run: pip install -e ".[dev,api,tui,rag]"

      - name: Smoke — eva --version
        # Vérifie que l'entry-point est fonctionnel et retourne la version
        run: eva --version

      - name: Smoke — import eva
        run: python -c "import eva; print('eva', eva.__version__)"

      - name: Run pytest
        # host=127.0.0.1 imposé dans le code — pas de service réseau dans les tests
        # Tests Ollama/LLM marqués xfail : pas de service externe requis
        run: pytest --tb=short -q
